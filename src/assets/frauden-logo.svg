<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 415" role="img" aria-labelledby="title desc">
  <title id="title">Frauden</title>
  <desc id="desc">Logo de Frauden con texto plateado y azul marino</desc>
  <defs>
    <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f5f6" />
      <stop offset="0.18" stop-color="#bfc1c4" />
      <stop offset="0.5" stop-color="#e8e9eb" />
      <stop offset="0.78" stop-color="#aeb1b5" />
      <stop offset="1" stop-color="#f8f9fa" />
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#28345f" />
      <stop offset="0.48" stop-color="#111a36" />
      <stop offset="1" stop-color="#071126" />
    </linearGradient>
  </defs>
  <rect width="1100" height="415" fill="white" opacity="0" />
  <g font-family="Inter, Montserrat, Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="-28">
    <text x="8" y="286" font-size="250" fill="url(#silver)">FRAUD</text>
    <text x="790" y="286" font-size="250" fill="url(#navy)">EN</text>
  </g>
  <text x="550" y="374" text-anchor="middle" font-family="Inter, Montserrat, Arial, sans-serif" font-size="42" font-weight="300" letter-spacing="11" fill="#2a2d34">Fraude empresarial y en los negocios</text>
</svg>
